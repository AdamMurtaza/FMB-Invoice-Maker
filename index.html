<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <div id="form-container" class="card">
        <h2>Generate New Invoice</h2>
        <form id="invoice-form">
            <div class="form-group">
                <label for="input-date">Date:</label>
                <input type="date" id="input-date" required>
            </div>
            <div class="form-group">
                <label for="input-item">Item Description:</label>
                <input type="text" id="input-item" placeholder="e.g., Web Development Services" required>
            </div>
            <div class="form-group">
                <label for="input-qty">Quantity:</label>
                <input type="number" id="input-qty" min="1" step="any" placeholder="0" required>
            </div>
            <div class="form-group">
                <label for="input-rate">Rate ($):</label>
                <input type="number" id="input-rate" min="0" step="0.01" placeholder="0.00" required>
            </div>
            <button type="submit" class="btn btn-primary">Submit & Preview</button>
        </form>
    </div>

    <div id="action-buttons" class="card hidden">
        <button id="btn-download" class="btn btn-success">Download PDF</button>
        <button id="btn-menu" class="btn btn-secondary">Return to Menu</button>
    </div>

    <div id="invoice-wrapper" class="hidden">
        <div id="invoice-capture" class="invoice-box">
            
            <div class="invoice-header">
                <div class="title-block">
                    <h1>INVOICE</h1>
                </div>
                <div class="meta-block">
                    <p><strong>DATE:</strong> <span id="inv-date"></span></p>
                    <p><strong>INVOICE NO:</strong> <span id="inv-number">1001</span></p>
                </div>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th class="col-desc">DESCRIPTION</th>
                        <th class="col-qty">QTY</th>
                        <th class="col-rate">RATE</th>
                        <th class="col-amount">AMOUNT</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td id="inv-item" class="text-left"></td>
                        <td id="inv-qty" class="text-center"></td>
                        <td id="inv-rate" class="text-right"></td>
                        <td id="inv-amount" class="text-right font-bold"></td>
                    </tr>
                    <tr><td class="empty-cell"></td><td></td><td></td><td></td></tr>
                    <tr><td class="empty-cell"></td><td></td><td></td><td></td></tr>
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="2" class="no-border"></td>
                        <td class="total-label">TOTAL</td>
                        <td id="inv-total" class="total-amount text-right"></td>
                    </tr>
                </tfoot>
            </table>

            <div class="invoice-footer">
                <p>Thank you for your business!</p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
