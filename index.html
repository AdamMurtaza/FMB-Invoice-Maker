%%html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Reset & Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
            text-align: center;
        }

        /* Form Styles */
        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        /* Button Styles */
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-right: 10px;
            transition: background 0.2s;
        }

        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; color: white; }
        .btn-success:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; color: white; }
        .btn-secondary:hover { background-color: #5a6268; }
        .btn-info { background-color: #17a2b8; color: white; }
        .btn-info:hover { background-color: #138496; }

        /* New button for removing items */
        .btn-remove-item {
            background-color: #dc3545;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
        }
        .btn-remove-item:hover {
            background-color: #c82333;
        }

        /* Control Helpers */
        .hidden { display: none !important; }

        /* INVOICE DESIGN */
        .invoice-box {
            background: #ffffff;
            width: 210mm;
            min-height: 297mm;
            padding: 20mm;
            margin: 0 auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: #333;
            font-size: 11pt;
            border-left: 5px solid #ff6347; /* Vibrant color: Tomato */
        }

        .invoice-header {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
            border-bottom: 2px solid #6a5acd; /* Vibrant color: SlateBlue */
            padding-bottom: 20px;
        }

        .title-block h1 {
            font-size: 38px;
            letter-spacing: 1px;
            color: #6a5acd; /* Vibrant color: SlateBlue */
            margin-bottom: 10px;
        }

        .meta-block {
            text-align: right;
            line-height: 1.6;
        }
        .meta-block p {
            margin-bottom: 5px;
        }
        .meta-block strong {
            color: #555;
            min-width: 90px;
            display: inline-block;
        }

        .recipient-block {
            line-height: 1.5;
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            grid-column: 1 / -1; /* Span across both columns */
        }
        .recipient-block h3 {
            font-size: 16px;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .recipient-block p {
            margin-bottom: 2px;
            color: #555; /* Added color */
        }

        /* Table Design */
        .invoice-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 40px;
            table-layout: fixed;
        }

        .invoice-table th,
        .invoice-table td {
            border: 1px solid #ddd;
            padding: 10px;
            font-size: 11pt;
            vertical-align: top;
        }

        .invoice-table th {
            background-color: #add8e6; /* Vibrant color: LightBlue */
            font-weight: bold;
            color: #000080; /* Vibrant color: Navy */
            text-align: left;
        }

        /* Specific column alignments for data */
        .invoice-table .col-desc { text-align: left; width: 50%; } /* Adjusted width for more space */
        .invoice-table .col-qty { text-align: center; width: 10%; }
        .invoice-table .col-rate { text-align: right; width: 20%; }
        .invoice-table .col-amount { text-align: right; width: 20%; }

        /* Utility Alignment Classes */
        .text-left { text-align: left; }
        .text-center { text-align: center; }
        .text-right { text-align: right; }
        .font-bold { font-weight: bold; }
        .empty-cell { height: 35px; }

        /* Totals Row Styles */
        .no-border { border: none !important; }
        .total-label {
            border: 1px solid #ddd !important;
            font-weight: bold;
            background-color: #f0f8ff; /* Vibrant color: AliceBlue */
            text-align: right;
            padding: 10px;
            color: #333; /* Added color */
        }
        .total-amount {
            border: 1px solid #ddd !important;
            font-weight: bold;
            background-color: #b0e0e6; /* Vibrant color: PowderBlue */
            padding: 10px;
            color: #000080; /* Vibrant color: Navy */
        }
    </style>
</head>
<body>

    <div id="form-container" class="card">
        <h2>Generate Invoice</h2>
        <form id="invoice-form">
            <div class="form-group">
                <label for="input-date">Date:</label>
                <input type="date" id="input-date" required>
            </div>

            <div id="item-inputs-container">
                <div class="item-row">
                    <div class="form-group">
                        <label for="input-item">Item Description:</label>
                        <input type="text" class="input-item" placeholder="e.g., Web Development Services" required>
                    </div>
                    <div class="form-group">
                        <label for="input-qty">Quantity:</label>
                        <input type="number" class="input-qty" min="1" step="any" placeholder="0" required>
                    </div>
                    <div class="form-group">
                        <label for="input-rate">Rate (PKR):</label>
                        <input type="number" class="input-rate" min="0" step="any" placeholder="0" required>
                    </div>
                </div>
            </div>
            <button type="button" id="add-item-btn" class="btn btn-secondary">Add Another Item</button>
            <button type="submit" class="btn btn-primary">Submit & Preview</button>
        </form>
    </div>

    <div id="action-buttons" class="card hidden">
        <button id="btn-download" class="btn btn-success">Download PDF</button>
        <button id="btn-download-excel" class="btn btn-info">Download Excel</button>
        <button id="btn-menu" class="btn btn-secondary">Return to Menu</button>
    </div>

    <div id="invoice-wrapper" class="hidden">
        <div id="invoice-capture" class="invoice-box">

            <div class="invoice-header">
                <div class="title-block">
                    <h1>INVOICE</h1>
                </div>
                <div class="meta-block">
                    <p><strong>DATE:</strong> <span id="inv-date"></span></p>
                }
                <div class="recipient-block">
                    <h3>Bill To:</h3>
                    <p><span id="inv-customer-name" class="font-bold">Faiz-ul Mawaid-ul Burhaniyah</span></p>
                    <p><span id="inv-customer-address">Pakistan, Karachi, Taheri Mohallah</span></p>
                </div>
            </div>

            <table class="invoice-table">
                <thead>
                    <tr>
                        <th class="col-desc">DESCRIPTION</th>
                        <th class="col-qty">QTY</th>
                        <th class="col-rate">RATE</th>
                        <th class="col-amount">AMOUNT</th>
                    </tr>
                </thead>
                <tbody id="invoice-table-body">
                    <!-- Invoice items will be dynamically inserted here -->
                </tbody>
                <tfoot>
                    <tr>
                        <td colspan="2" class="no-border"></td>
                        <td class="total-label">TOTAL</td>
                        <td id="inv-total" class="total-amount text-right"></td>
                    </tr>
                </tfoot>
            </table>
        </div>
    </div>

    <script>
        // Dom Element Elements
        const invoiceForm = document.getElementById('invoice-form');
        const formContainer = document.getElementById('form-container');
        const actionButtons = document.getElementById('action-buttons');
        const invoiceWrapper = document.getElementById('invoice-wrapper');
        const itemInputsContainer = document.getElementById('item-inputs-container');
        const addItemBtn = document.getElementById('add-item-btn');

        // PDF & Excel Button Event Listeners
        const btnDownload = document.getElementById('btn-download');
        const btnDownloadExcel = document.getElementById('btn-download-excel');
        const btnMenu = document.getElementById('btn-menu');

        let invoiceItems = []; // Store multiple items

        // Add initial item row - REMOVED TO PREVENT DUPLICATE
        // addItemRow();

        addItemBtn.addEventListener('click', addItemRow);

        function addItemRow() {
            const itemRowDiv = document.createElement('div');
            itemRowDiv.classList.add('item-row');
            itemRowDiv.innerHTML = `
                <div class="form-group">
                    <label>Item Description:</label>
                    <input type="text" class="input-item" placeholder="e.g., Web Development Services" required>
                </div>
                <div class="form-group">
                    <label>Quantity:</label>
                    <input type="number" class="input-qty" min="1" step="any" placeholder="0" required>
                </div>
                <div class="form-group">
                    <label>Rate (PKR):</label>
                    <input type="number" class="input-rate" min="0" step="any" placeholder="0" required>
                </div>
                <button type="button" class="btn-remove-item">Remove</button>
            `;
            itemInputsContainer.appendChild(itemRowDiv);

            itemRowDiv.querySelector('.btn-remove-item').addEventListener('click', function() {
                itemInputsContainer.removeChild(itemRowDiv);
            });
        }

        // Form Submitting Engine
        invoiceForm.addEventListener('submit', function(e) {
            e.preventDefault(); // Stop standard page refreshing

            invoiceItems = [];
            let totalAmount = 0;

            const itemRows = document.querySelectorAll('.item-row');
            itemRows.forEach(row => {
                const itemVal = row.querySelector('.input-item').value;
                const qtyVal = parseFloat(row.querySelector('.input-qty').value);
                const rateVal = parseFloat(row.querySelector('.input-rate').value);

                const calculatedAmount = qtyVal * rateVal;
                totalAmount += calculatedAmount;

                invoiceItems.push({
                    item: itemVal,
                    quantity: qtyVal,
                    rate: rateVal,
                    amount: calculatedAmount
                });
            });

            // Inject data inside preview spreadsheet slots
            document.getElementById('inv-date').innerText = formatDate(document.getElementById('input-date').value);

            const invoiceTableBody = document.getElementById('invoice-table-body');
            invoiceTableBody.innerHTML = ''; // Clear previous items

            invoiceItems.forEach(item => {
                const row = invoiceTableBody.insertRow();
                row.innerHTML = `
                    <td class="text-left col-desc">${item.item}</td>
                    <td class="text-center col-qty">${item.quantity}</td>
                    <td class="text-right col-rate">${'PKR ' + item.rate.toLocaleString('en-PK', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td>
                    <td class="text-right font-bold col-amount">${'PKR ' + item.amount.toLocaleString('en-PK', {minimumFractionDigits: 0, maximumFractionDigits: 0})}</td>
                `;
            });

            document.getElementById('inv-total').innerText = 'PKR ' + totalAmount.toLocaleString('en-PK', {minimumFractionDigits: 0, maximumFractionDigits: 0});

            // Adjust visibility screens
            formContainer.classList.add('hidden');
            actionButtons.classList.remove('hidden');
            invoiceWrapper.classList.remove('hidden');
        });

        // Download PDF Action Logic
        btnDownload.addEventListener('click', function() {
            const element = document.getElementById('invoice-capture');

            const options = {
                margin:       0,
                filename:     `Invoice_${document.getElementById('inv-date').innerText.replace(/\//g, '-')}.pdf`,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(options).from(element).save();
        });

        // Download Excel Action Logic
        btnDownloadExcel.addEventListener('click', function() {
            if (invoiceItems.length === 0) {
                alert('Please generate an invoice first.');
                return;
            }
            const csvRows = [];
            const headers = ['Date', 'Item Description', 'Quantity', 'Rate (PKR)', 'Amount (PKR)'];
            csvRows.push(headers.join(','));

            const invoiceDate = formatDate(document.getElementById('input-date').value);

            invoiceItems.forEach(item => {
                const data = [
                    invoiceDate,
                    item.item,
                    item.quantity,
                    item.rate.toFixed(0), // Format rate to 0 decimal places
                    item.amount.toFixed(0) // Format amount to 0 decimal places
                ];
                csvRows.push(data.join(','));
            });

            const csvString = csvRows.join('\n');
            const blob = new Blob([csvString], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.setAttribute('download', `Invoice_${document.getElementById('inv-date').innerText.replace(/\//g, '-')}.xlsx`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });

        // Reset Menu Loop Logic
        btnMenu.addEventListener('click', function() {
            invoiceForm.reset();
            itemInputsContainer.innerHTML = ''; // Clear all dynamic item rows
            addItemRow(); // Add back one empty item row
            formContainer.classList.remove('hidden');
            actionButtons.classList.add('hidden');
            invoiceWrapper.classList.add('hidden');
            invoiceItems = []; // Clear stored data
        });

        // Helper Function for parsing generic HTML Date components cleanly
        function formatDate(dateString) {
            if(!dateString) return "";
            const parts = dateString.split('-');
            return `${parts[1]}/${parts[2]}/${parts[0]}`;
        }
    </script>
</body>
</html>
